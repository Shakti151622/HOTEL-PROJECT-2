<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room QR Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0D0D0D;color:#F5EFE6;padding:20px 16px 60px;min-height:100vh;}
h1{font-family:Georgia,serif;font-size:20px;font-weight:400;color:#C9A96E;text-align:center;margin-bottom:20px;letter-spacing:0.05em;}
.card{background:#1A1814;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px;margin-bottom:14px;}
label{display:block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#6A6055;margin-bottom:6px;}
input{width:100%;background:#0D0D0D;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:#F5EFE6;font-size:15px;outline:none;margin-bottom:12px;}
input:focus{border-color:rgba(201,169,110,0.5);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{width:100%;background:#C9A96E;color:#0D0D0D;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;}
.btn.ghost{background:transparent;color:#C9A96E;border:1px solid rgba(201,169,110,0.3);margin-top:10px;}
#output{display:none;margin-top:4px;}
.qr-wrap{background:#F5EFE6;border-radius:16px;padding:20px 20px 16px;display:flex;flex-direction:column;align-items:center;margin-bottom:14px;}
.qr-hotel{font-family:Georgia,serif;font-size:11px;letter-spacing:0.18em;color:#8A7050;text-transform:uppercase;margin-bottom:10px;}
.qr-cw{position:relative;display:inline-block;}
.qr-cw canvas{display:block;border-radius:6px;}
.qr-logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;background:white;border-radius:7px;display:flex;align-items:center;justify-content:center;}
.qr-logo-i{width:22px;height:22px;background:#C9A96E;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.qr-rn{font-family:Georgia,serif;font-size:22px;color:#1A1814;margin-top:12px;letter-spacing:0.06em;}
.qr-sub{font-size:10px;color:#A09080;letter-spacing:0.1em;text-transform:uppercase;margin-top:3px;}
.dl-btn{width:100%;background:#1A1814;color:#C9A96E;border:1px solid rgba(201,169,110,0.3);border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;}
.rlbl{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#5A5248;text-align:center;margin-bottom:8px;}
</style>
</head>
<body>
<h1>Room QR Generator</h1>

<div class="card">
  <label>Guest Page URL</label>
  <input id="base-url" type="url" value="https://shakti151622.github.io/HOTEL-PROJECT-2/hyatt-guest-ui-final_2.html">
  <div class="row">
    <div><label>Room Number</label><input id="room" type="text" placeholder="203"></div>
    <div><label>Guest Name</label><input id="guest" type="text" placeholder="Rajan Singh"></div>
  </div>
  <button class="btn" onclick="gen()">Generate QR</button>
</div>

<div class="card">
  <label>Batch — comma separated rooms</label>
  <input id="batch" type="text" placeholder="101, 102, 103, 201, 202, 203">
  <button class="btn ghost" onclick="genBatch()">Generate All</button>
</div>

<div id="output"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
function baseUrl(){return document.getElementById('base-url').value.trim().replace(/\/$/,'');}
function makeUrl(room,guest){return baseUrl()+'?room='+encodeURIComponent(room)+'&guest='+encodeURIComponent(guest||'Guest');}

async function makeCard(room,guest){
  var url=makeUrl(room,guest);
  var div=document.createElement('div');

  var lbl=document.createElement('div');lbl.className='rlbl';lbl.textContent='Room '+room;
  div.appendChild(lbl);

  var wrap=document.createElement('div');wrap.className='qr-wrap';

  var h=document.createElement('div');h.className='qr-hotel';h.textContent='Hyatt Hotel';
  wrap.appendChild(h);

  var cw=document.createElement('div');cw.className='qr-cw';
  var canvas=document.createElement('canvas');
  cw.appendChild(canvas);

  var logo=document.createElement('div');logo.className='qr-logo';
  var li=document.createElement('div');li.className='qr-logo-i';
  li.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';
  logo.appendChild(li);cw.appendChild(logo);
  wrap.appendChild(cw);

  var rn=document.createElement('div');rn.className='qr-rn';rn.textContent=room;
  wrap.appendChild(rn);
  var sub=document.createElement('div');sub.className='qr-sub';sub.textContent='Scan to order';
  wrap.appendChild(sub);

  var dl=document.createElement('button');dl.className='dl-btn';dl.textContent='⬇ Download PNG';
  dl.onclick=function(){downloadCard(canvas,room);};
  wrap.appendChild(dl);
  div.appendChild(wrap);

  await new Promise(function(res){
    QRCode.toCanvas(canvas,url,{width:200,margin:1,errorCorrectionLevel:'H',color:{dark:'#1A1814',light:'#F5EFE6'}},function(){res();});
  });
  return div;
}

async function gen(){
  var room=document.getElementById('room').value.trim();
  var guest=document.getElementById('guest').value.trim();
  if(!room){alert('Enter room number');return;}
  var out=document.getElementById('output');
  out.style.display='block';
  out.innerHTML='<div style="text-align:center;color:#5A5248;padding:20px;font-size:13px">Generating...</div>';
  var card=await makeCard(room,guest||'Guest');
  out.innerHTML='';out.appendChild(card);
  out.scrollIntoView({behavior:'smooth'});
}

async function genBatch(){
  var rooms=document.getElementById('batch').value.split(',').map(function(r){return r.trim();}).filter(Boolean);
  if(!rooms.length){alert('Enter room numbers');return;}
  var out=document.getElementById('output');
  out.style.display='block';
  out.innerHTML='<div style="text-align:center;color:#5A5248;padding:20px;font-size:13px">Generating '+rooms.length+' QR codes...</div>';
  var frag=document.createDocumentFragment();
  for(var i=0;i<rooms.length;i++){var c=await makeCard(rooms[i],'Guest');frag.appendChild(c);}
  out.innerHTML='';out.appendChild(frag);
  out.scrollIntoView({behavior:'smooth'});
}

function downloadCard(qrCanvas,room){
  var W=300,H=340;
  var off=document.createElement('canvas');off.width=W;off.height=H;
  var ctx=off.getContext('2d');
  ctx.fillStyle='#F5EFE6';rr(ctx,0,0,W,H,16);ctx.fill();
  ctx.fillStyle='#A09070';ctx.font='11px Georgia';ctx.textAlign='center';
  ctx.fillText('HYATT HOTEL',W/2,30);
  var qs=200,qx=(W-qs)/2,qy=46;
  ctx.drawImage(qrCanvas,qx,qy,qs,qs);
  var lx=W/2,ly=qy+qs/2;
  ctx.fillStyle='white';rr(ctx,lx-16,ly-16,32,32,7);ctx.fill();
  ctx.fillStyle='#C9A96E';rr(ctx,lx-11,ly-11,22,22,5);ctx.fill();
  ctx.fillStyle='#1A1814';ctx.font='26px Georgia';ctx.textAlign='center';
  ctx.fillText('Room '+room,W/2,qy+qs+30);
  ctx.fillStyle='#A09080';ctx.font='10px sans-serif';
  ctx.fillText('SCAN TO ORDER',W/2,qy+qs+48);
  ctx.fillStyle='#C9A96E';ctx.fillRect(80,H-10,W-160,2);
  var a=document.createElement('a');a.download='QR-Room-'+room+'.png';
  a.href=off.toDataURL('image/png');a.click();
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
</script>
</body>
</html>
